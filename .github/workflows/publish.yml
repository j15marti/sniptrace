name: Publish to npm

# Publishes @sniptrace/cli to npm on every version tag (e.g. v1.1.1) and on manual
# dispatch. Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret required.
# NOTES:
#  - No `registry-url` on setup-node: it writes a token-based .npmrc that shadows OIDC.
#  - npm upgrade + publish run in ONE step so the OIDC-capable npm (>= 11.5.1) publishes.
#  - Requires a matching Trusted Publisher on npmjs.com (org j15marti, repo sniptrace,
#    workflow file publish.yml, environment blank) or publish fails with ENEEDAUTH.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm trusted publishing (OIDC) + provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24.x"

      - name: Upgrade npm and publish via OIDC
        run: |
          npm install -g npm@^11
          echo "node: $(node -v)  npm: $(npm -v)  which-npm: $(which npm)"
          npm publish --provenance --access public
