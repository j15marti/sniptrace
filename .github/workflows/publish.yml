name: Publish to npm

# Publishes @sniptrace/cli to npm whenever a version tag (e.g. v1.1.1) is pushed.
# Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret required.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm trusted publishing (OIDC) + provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing requires npm >= 11.5.1
      - run: npm install -g npm@latest

      - run: npm publish --access public
