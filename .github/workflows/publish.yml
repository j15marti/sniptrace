name: Publish to npm

# Publishes @sniptrace/cli to npm on every version tag (e.g. v1.1.1) and on manual
# dispatch. Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret required.
# NOTE: deliberately no `registry-url` on setup-node — that writes a token-based
# .npmrc which shadows the OIDC flow. The npm upgrade + publish run in ONE step so
# the upgraded npm (>= 11.5.1, required for OIDC) is the one that actually publishes.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm trusted publishing (OIDC) + provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Upgrade npm and publish via OIDC
        run: |
          npm install -g npm@latest
          echo "node: $(node -v)  npm: $(npm -v)  which-npm: $(which npm)"
          npm publish --access public
